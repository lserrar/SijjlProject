server {
    listen 80;
    server_name sijillproject.com www.sijillproject.com sijillproject.fr www.sijillproject.fr sijillproject.org www.sijillproject.org app.sijillproject.com _;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        # Redirect app subdomain to HTTPS
        if ($host = "app.sijillproject.com") {
            return 301 https://app.sijillproject.com$request_uri;
        }
        return 301 https://sijillproject.com$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name sijillproject.com www.sijillproject.com;

    ssl_certificate /etc/letsencrypt/live/sijillproject.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sijillproject.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    client_max_body_size 50M;

    # Redirect www to non-www
    if ($host = "www.sijillproject.com") {
        return 301 https://sijillproject.com$request_uri;
    }

    # API routes -> backend
    location /api/ {
        proxy_pass http://backend:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # Site React (SPA) - served by backend via /api/site/
    location / {
        proxy_pass http://backend:8001/api/site/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Static assets caching
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        proxy_pass http://backend:8001;
        proxy_set_header Host $host;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}

# ─── WebApp: app.sijillproject.com ───────────────────────────────────────────
server {
    listen 443 ssl;
    server_name app.sijillproject.com;

    ssl_certificate /etc/letsencrypt/live/sijillproject.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sijillproject.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    client_max_body_size 50M;

    # API routes -> backend (shared with main site)
    location /api/ {
        proxy_pass http://backend:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # WebApp SPA - served by backend via /webapp/
    location / {
        proxy_pass http://backend:8001/webapp/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Static assets caching
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        proxy_pass http://backend:8001;
        proxy_set_header Host $host;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
