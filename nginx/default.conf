server {
    listen 80;
    server_name sijill.com www.sijill.com sijill.fr www.sijill.fr sijill.org www.sijill.org;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://sijill.com$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name sijill.com www.sijill.com sijill.fr www.sijill.fr sijill.org www.sijill.org;

    ssl_certificate /etc/letsencrypt/live/sijill.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sijill.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    client_max_body_size 50M;

    # Redirect www to non-www
    if ($host != "sijill.com") {
        return 301 https://sijill.com$request_uri;
    }

    # API routes -> backend
    location /api/ {
        proxy_pass http://backend:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # Site React (SPA) - served by backend
    location / {
        proxy_pass http://backend:8001/api/site/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Static assets caching
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        proxy_pass http://backend:8001;
        proxy_set_header Host $host;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
