<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Réinitialiser le mot de passe - Sijill Project</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .reset-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            background: linear-gradient(180deg, #0a0a0a 0%, #0f0f0f 100%);
        }
        
        .reset-card {
            background: #141414;
            border-radius: 16px;
            padding: 3rem;
            max-width: 450px;
            width: 100%;
            border: 1px solid rgba(196, 164, 105, 0.1);
        }
        
        .reset-logo {
            text-align: center;
            margin-bottom: 2rem;
        }
        
        .reset-logo h1 {
            font-family: 'Cinzel', serif;
            font-size: 1.5rem;
            color: #C4A869;
            margin: 0;
            letter-spacing: 3px;
        }
        
        .reset-logo span {
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.5);
            display: block;
            margin-top: 0.5rem;
            font-family: 'EB Garamond', serif;
        }
        
        .reset-title {
            font-family: 'Cinzel', serif;
            font-size: 1.25rem;
            color: #fff;
            text-align: center;
            margin-bottom: 1.5rem;
        }
        
        .reset-form {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }
        
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        
        .form-group label {
            font-family: 'EB Garamond', serif;
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.7);
        }
        
        .form-group input {
            background: #1a1a1a;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 1rem;
            font-size: 1rem;
            color: #fff;
            font-family: 'EB Garamond', serif;
            transition: all 0.3s ease;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #C4A869;
        }
        
        .reset-btn {
            background: linear-gradient(135deg, #C4A869 0%, #9A7B4F 100%);
            color: #0a0a0a;
            border: none;
            border-radius: 8px;
            padding: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .reset-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(196, 164, 105, 0.3);
        }
        
        .reset-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }
        
        .message {
            padding: 1rem;
            border-radius: 8px;
            text-align: center;
            font-family: 'EB Garamond', serif;
            display: none;
        }
        
        .message.success {
            background: rgba(4, 209, 130, 0.1);
            border: 1px solid rgba(4, 209, 130, 0.3);
            color: #04D182;
            display: block;
        }
        
        .message.error {
            background: rgba(255, 82, 82, 0.1);
            border: 1px solid rgba(255, 82, 82, 0.3);
            color: #ff5252;
            display: block;
        }
        
        .back-link {
            text-align: center;
            margin-top: 1.5rem;
        }
        
        .back-link a {
            color: rgba(255, 255, 255, 0.5);
            text-decoration: none;
            font-family: 'EB Garamond', serif;
            font-size: 0.9rem;
            transition: color 0.3s ease;
        }
        
        .back-link a:hover {
            color: #C4A869;
        }
        
        .loading-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
            padding: 2rem;
        }
        
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(196, 164, 105, 0.2);
            border-top-color: #C4A869;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .email-display {
            background: #1a1a1a;
            border: 1px solid rgba(196, 164, 105, 0.2);
            border-radius: 8px;
            padding: 1rem;
            text-align: center;
            margin-bottom: 1rem;
        }
        
        .email-display span {
            color: #C4A869;
            font-family: 'EB Garamond', serif;
        }
    </style>
</head>
<body>
    <div class="reset-container">
        <div class="reset-card">
            <div class="reset-logo">
                <h1>SIJILL PROJECT</h1>
                <span>Plateforme academique - Sciences islamiques</span>
            </div>
            
            <!-- Loading State -->
            <div id="loadingState" class="loading-state">
                <div class="spinner"></div>
                <p style="color: rgba(255,255,255,0.5); font-family: 'EB Garamond', serif;">Verification du lien...</p>
            </div>
            
            <!-- Reset Form -->
            <div id="resetForm" style="display: none;">
                <h2 class="reset-title">Nouveau mot de passe</h2>
                
                <div id="emailDisplay" class="email-display">
                    <span id="userEmail"></span>
                </div>
                
                <form class="reset-form" onsubmit="handleReset(event)">
                    <div class="form-group">
                        <label for="newPassword">Nouveau mot de passe</label>
                        <input type="password" id="newPassword" name="newPassword" required minlength="6" placeholder="Minimum 6 caracteres">
                    </div>
                    
                    <div class="form-group">
                        <label for="confirmPassword">Confirmer le mot de passe</label>
                        <input type="password" id="confirmPassword" name="confirmPassword" required minlength="6" placeholder="Confirmez votre mot de passe">
                    </div>
                    
                    <div id="formMessage" class="message"></div>
                    
                    <button type="submit" id="submitBtn" class="reset-btn">
                        Reinitialiser le mot de passe
                    </button>
                </form>
                
                <div class="back-link">
                    <a href="../index.html"><i class="fas fa-arrow-left"></i> Retour a l'accueil</a>
                </div>
            </div>
            
            <!-- Error State -->
            <div id="errorState" style="display: none;">
                <div class="message error" style="display: block;">
                    <i class="fas fa-exclamation-circle"></i>
                    <p id="errorMessage">Lien invalide ou expire</p>
                </div>
                <div class="back-link" style="margin-top: 2rem;">
                    <a href="../index.html"><i class="fas fa-arrow-left"></i> Retour a l'accueil</a>
                </div>
            </div>
            
            <!-- Success State -->
            <div id="successState" style="display: none;">
                <div class="message success" style="display: block;">
                    <i class="fas fa-check-circle"></i>
                    <p>Votre mot de passe a ete reinitialise avec succes !</p>
                    <p style="margin-top: 0.5rem; opacity: 0.8;">Vous pouvez maintenant vous connecter.</p>
                </div>
                <div class="back-link" style="margin-top: 2rem;">
                    <a href="../index.html"><i class="fas fa-arrow-left"></i> Se connecter</a>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        const API_URL = 'https://reading-hub-33.preview.emergentagent.com/api';
        let resetToken = null;
        
        // Get token from URL
        function getTokenFromUrl() {
            const params = new URLSearchParams(window.location.search);
            return params.get('token');
        }
        
        // Validate token on page load
        async function validateToken() {
            const token = getTokenFromUrl();
            
            if (!token) {
                showError('Aucun token fourni');
                return;
            }
            
            try {
                const response = await fetch(`${API_URL}/auth/reset-password/validate?token=${token}`);
                const data = await response.json();
                
                if (response.ok && data.valid) {
                    resetToken = token;
                    document.getElementById('userEmail').textContent = data.email;
                    showResetForm();
                } else {
                    showError(data.detail || 'Lien invalide ou expire');
                }
            } catch (error) {
                console.error('Validation error:', error);
                showError('Erreur de connexion au serveur');
            }
        }
        
        function showResetForm() {
            document.getElementById('loadingState').style.display = 'none';
            document.getElementById('errorState').style.display = 'none';
            document.getElementById('successState').style.display = 'none';
            document.getElementById('resetForm').style.display = 'block';
        }
        
        function showError(message) {
            document.getElementById('loadingState').style.display = 'none';
            document.getElementById('resetForm').style.display = 'none';
            document.getElementById('successState').style.display = 'none';
            document.getElementById('errorMessage').textContent = message;
            document.getElementById('errorState').style.display = 'block';
        }
        
        function showSuccess() {
            document.getElementById('loadingState').style.display = 'none';
            document.getElementById('resetForm').style.display = 'none';
            document.getElementById('errorState').style.display = 'none';
            document.getElementById('successState').style.display = 'block';
        }
        
        async function handleReset(event) {
            event.preventDefault();
            
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const submitBtn = document.getElementById('submitBtn');
            const messageDiv = document.getElementById('formMessage');
            
            // Clear previous messages
            messageDiv.className = 'message';
            messageDiv.style.display = 'none';
            
            // Validate passwords match
            if (newPassword !== confirmPassword) {
                messageDiv.className = 'message error';
                messageDiv.textContent = 'Les mots de passe ne correspondent pas';
                messageDiv.style.display = 'block';
                return;
            }
            
            // Validate password length
            if (newPassword.length < 6) {
                messageDiv.className = 'message error';
                messageDiv.textContent = 'Le mot de passe doit contenir au moins 6 caracteres';
                messageDiv.style.display = 'block';
                return;
            }
            
            // Disable button
            submitBtn.disabled = true;
            submitBtn.textContent = 'Reinitialisation...';
            
            try {
                const response = await fetch(`${API_URL}/auth/reset-password`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        token: resetToken,
                        new_password: newPassword
                    })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    showSuccess();
                } else {
                    messageDiv.className = 'message error';
                    messageDiv.textContent = data.detail || 'Erreur lors de la reinitialisation';
                    messageDiv.style.display = 'block';
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Reinitialiser le mot de passe';
                }
            } catch (error) {
                console.error('Reset error:', error);
                messageDiv.className = 'message error';
                messageDiv.textContent = 'Erreur de connexion au serveur';
                messageDiv.style.display = 'block';
                submitBtn.disabled = false;
                submitBtn.textContent = 'Reinitialiser le mot de passe';
            }
        }
        
        // Initialize on page load
        document.addEventListener('DOMContentLoaded', validateToken);
    </script>
</body>
</html>
