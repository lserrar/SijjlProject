<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thématiques - Le Sijill Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --bg-primary: #0a0a0a; --bg-secondary: #141414; --bg-tertiary: #1a1a1a; --bg-card: #1e1e1e; --text-primary: #ffffff; --text-secondary: #a0a0a0; --text-muted: #666666; --brand-primary: #04D182; --brand-secondary: #02b36e; --border-subtle: #2a2a2a; --danger: #ef4444; --warning: #f59e0b; --success: #10b981; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg-primary); color: var(--text-primary); min-height: 100vh; }
        .admin-layout { display: flex; min-height: 100vh; }
        .sidebar { width: 260px; background: var(--bg-secondary); border-right: 1px solid var(--border-subtle); padding: 24px 0; position: fixed; height: 100vh; overflow-y: auto; display: flex; flex-direction: column; }
        .sidebar-header { padding: 0 20px 24px; border-bottom: 1px solid var(--border-subtle); margin-bottom: 16px; }
        .sidebar-logo { display: flex; align-items: center; gap: 12px; }
        .sidebar-logo-icon { width: 40px; height: 40px; background: linear-gradient(135deg, var(--brand-primary), var(--brand-secondary)); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: 700; }
        .sidebar-logo-text { font-size: 18px; font-weight: 700; }
        .sidebar-logo-text span { color: var(--brand-primary); }
        .sidebar-badge { font-size: 10px; color: var(--text-secondary); background: var(--bg-tertiary); padding: 2px 8px; border-radius: 4px; margin-top: 4px; display: inline-block; }
        .sidebar-nav { padding: 0 12px; flex: 1; }
        .nav-section { margin-bottom: 24px; }
        .nav-section-title { font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted); padding: 0 12px; margin-bottom: 8px; }
        .nav-item { display: flex; align-items: center; gap: 12px; padding: 12px; border-radius: 8px; color: var(--text-secondary); text-decoration: none; transition: all 0.2s; margin-bottom: 4px; }
        .nav-item:hover { background: var(--bg-tertiary); color: var(--text-primary); }
        .nav-item.active { background: rgba(4, 209, 130, 0.1); color: var(--brand-primary); }
        .nav-item i { width: 20px; text-align: center; font-size: 16px; }
        .user-header { display: flex; align-items: center; gap: 12px; padding: 20px; border-top: 1px solid var(--border-subtle); margin-top: auto; }
        .user-avatar { width: 36px; height: 36px; border-radius: 8px; }
        .user-info { flex: 1; }
        .user-name { font-size: 14px; font-weight: 500; }
        .user-role { font-size: 12px; color: var(--brand-primary); }
        .logout-btn { background: none; border: none; color: var(--text-secondary); cursor: pointer; padding: 8px; border-radius: 6px; }
        .logout-btn:hover { color: var(--danger); }
        .main-content { flex: 1; margin-left: 260px; padding: 32px; }
        .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px; }
        .page-title { font-size: 28px; font-weight: 700; }
        .page-description { color: var(--text-secondary); margin-top: 4px; font-size: 14px; }
        .btn { display: inline-flex; align-items: center; gap: 8px; padding: 10px 20px; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; border: none; transition: all 0.2s; }
        .btn-primary { background: var(--brand-primary); color: var(--bg-primary); }
        .btn-primary:hover { background: var(--brand-secondary); }
        .btn-secondary { background: var(--bg-tertiary); color: var(--text-primary); border: 1px solid var(--border-subtle); }
        .btn-danger { background: var(--danger); color: white; }
        .btn-sm { padding: 6px 12px; font-size: 13px; }
        .btn-icon { padding: 8px; width: 36px; height: 36px; justify-content: center; }
        .card { background: var(--bg-card); border: 1px solid var(--border-subtle); border-radius: 12px; padding: 24px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 14px 16px; text-align: left; border-bottom: 1px solid var(--border-subtle); }
        th { font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-secondary); font-weight: 600; }
        tr:hover { background: var(--bg-tertiary); }
        .table-cell-text { font-weight: 500; }
        .table-cell-subtext { font-size: 12px; color: var(--text-secondary); }
        .status { display: inline-flex; padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 500; }
        .status-active { background: rgba(16, 185, 129, 0.15); color: var(--success); }
        .status-inactive { background: rgba(239, 68, 68, 0.15); color: var(--danger); }
        .actions { display: flex; gap: 8px; }
        .loading { display: flex; align-items: center; justify-content: center; padding: 40px; color: var(--text-secondary); }
        .spinner { width: 24px; height: 24px; border: 2px solid var(--border-subtle); border-top-color: var(--brand-primary); border-radius: 50%; animation: spin 0.8s linear infinite; margin-right: 12px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0, 0, 0, 0.8); display: flex; align-items: center; justify-content: center; z-index: 1000; opacity: 0; visibility: hidden; transition: all 0.3s; }
        .modal-overlay.active { opacity: 1; visibility: visible; }
        .modal { background: var(--bg-card); border-radius: 16px; max-width: 500px; width: 90%; max-height: 90vh; overflow-y: auto; }
        .modal-overlay.active .modal { transform: translateY(0); }
        .modal-header { padding: 20px 24px; border-bottom: 1px solid var(--border-subtle); display: flex; justify-content: space-between; align-items: center; }
        .modal-title { font-size: 18px; font-weight: 600; }
        .modal-close { background: none; border: none; color: var(--text-secondary); font-size: 20px; cursor: pointer; }
        .modal-body { padding: 24px; }
        .modal-footer { padding: 16px 24px; border-top: 1px solid var(--border-subtle); display: flex; justify-content: flex-end; gap: 12px; }
        .form-group { margin-bottom: 20px; }
        .form-label { display: block; font-size: 14px; font-weight: 500; margin-bottom: 8px; }
        .form-input, .form-textarea { width: 100%; padding: 12px 16px; background: var(--bg-tertiary); border: 1px solid var(--border-subtle); border-radius: 8px; color: var(--text-primary); font-size: 14px; font-family: inherit; }
        .form-input:focus, .form-textarea:focus { outline: none; border-color: var(--brand-primary); }
        .form-textarea { min-height: 100px; resize: vertical; }
        .toast-container { position: fixed; top: 24px; right: 24px; z-index: 1100; }
        .toast { background: var(--bg-card); border: 1px solid var(--border-subtle); border-radius: 10px; padding: 16px 20px; display: flex; align-items: center; gap: 12px; margin-bottom: 12px; animation: slideIn 0.3s ease; min-width: 300px; }
        .toast.success { border-left: 4px solid var(--success); }
        .toast.error { border-left: 4px solid var(--danger); }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .order-badge { background: var(--brand-primary); color: #000; font-size: 12px; font-weight: 700; width: 28px; height: 28px; border-radius: 6px; display: flex; align-items: center; justify-content: center; }
        @media (max-width: 768px) { .sidebar { width: 70px; } .sidebar-header, .nav-section-title, .user-info, .nav-item span, .sidebar-badge { display: none; } .main-content { margin-left: 70px; padding: 20px; } }
    </style>
</head>
<body>
    <div class="admin-layout">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo">
                    <div class="sidebar-logo-icon">H</div>
                    <div>
                        <div class="sidebar-logo-text">Le <span>Sijill</span></div>
                        <div class="sidebar-badge">Admin Panel</div>
                    </div>
                </div>
            </div>
            <nav class="sidebar-nav">
                <div class="nav-section">
                    <div class="nav-section-title">Dashboard</div>
                    <a href="/api/admin-panel/" class="nav-item"><i class="fas fa-chart-pie"></i><span>Tableau de bord</span></a>
                </div>
                <div class="nav-section">
                    <div class="nav-section-title">Contenu</div>
                    <a href="/api/admin-panel/professors" class="nav-item"><i class="fas fa-user-graduate"></i><span>Professeurs</span></a>
                    <a href="/api/admin-panel/courses" class="nav-item"><i class="fas fa-book-open"></i><span>Cours</span></a>
                    <a href="/api/admin-panel/audios" class="nav-item"><i class="fas fa-headphones"></i><span>Audios</span></a>
                    <a href="/api/admin-panel/audio-categories" class="nav-item"><i class="fas fa-folder-tree"></i><span>Catégories Audio</span></a>
                    <a href="/api/admin-panel/thematiques" class="nav-item active"><i class="fas fa-layer-group"></i><span>Cursus</span></a>
                    <a href="/api/admin-panel/audio-categories" class="nav-item"><i class="fas fa-folder-tree"></i><span>Catégories Audio</span></a>
                    <a href="/api/admin-panel/bibliographies" class="nav-item"><i class="fas fa-book"></i><span>Bibliographies</span></a>
                    <a href="/api/admin-panel/masterclasses" class="nav-item"><i class="fas fa-video"></i><span>Masterclasses</span></a>
                </div>
                <div class="nav-section">
                    <div class="nav-section-title">Gestion</div>
                    <a href="/api/admin-panel/users" class="nav-item"><i class="fas fa-users"></i><span>Utilisateurs</span></a>
                    <a href="/api/admin-panel/r2" class="nav-item"><i class="fas fa-cloud"></i><span>Stockage R2</span></a>
                </div>
            </nav>
            <div class="user-header">
                <img src="https://ui-avatars.com/api/?name=Admin&background=04D182&color=000" class="user-avatar" id="userAvatar">
                <div class="user-info">
                    <div class="user-name" id="userName">Admin</div>
                    <div class="user-role">Administrateur</div>
                </div>
                <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i></button>
            </div>
        </aside>

        <main class="main-content">
            <div class="page-header">
                <div>
                    <h1 class="page-title">Cursus</h1>
                    <p class="page-description">Les 20 themes de l'enseignement islamique</p>
                </div>
                <button class="btn btn-primary" onclick="openModal()"><i class="fas fa-plus"></i> Nouvelle thématique</button>
            </div>

            <div class="card">
                <div id="dataTable"><div class="loading"><div class="spinner"></div> Chargement...</div></div>
            </div>
        </main>
    </div>

    <div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
        <div class="modal" onclick="event.stopPropagation()">
            <div class="modal-header">
                <h3 class="modal-title" id="modalTitle">Nouvelle thématique</h3>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <form id="dataForm" onsubmit="saveData(event)">
                <div class="modal-body">
                    <input type="hidden" id="itemId">
                    <div class="form-group">
                        <label class="form-label">Nom *</label>
                        <input type="text" class="form-input" id="name" required placeholder="Ex: Philosophie islamique">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Description</label>
                        <textarea class="form-textarea" id="description" placeholder="Description de la thématique..."></textarea>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Ordre d'affichage</label>
                        <input type="number" class="form-input" id="order" value="1" min="1">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Icône (FontAwesome)</label>
                        <input type="text" class="form-input" id="icon" placeholder="book" value="book">
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" onclick="closeModal()">Annuler</button>
                    <button type="submit" class="btn btn-primary">Enregistrer</button>
                </div>
            </form>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script>
        const API_BASE = '/api';
        let authToken = localStorage.getItem('adminToken');
        let items = [];

        function showToast(message, type = 'success') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerHTML = `<i class="fas fa-${type === 'success' ? 'check-circle' : 'exclamation-circle'}"></i><span>${message}</span>`;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 4000);
        }

        async function apiRequest(endpoint, method = 'GET', body = null) {
            const options = { method, headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${authToken}` } };
            if (body) options.body = JSON.stringify(body);
            const response = await fetch(`${API_BASE}${endpoint}`, options);
            if (response.status === 401 || response.status === 403) { localStorage.removeItem('adminToken'); window.location.href = '/api/admin-panel/login'; return null; }
            if (!response.ok) { const error = await response.json(); throw new Error(error.detail || 'Erreur serveur'); }
            return response.json();
        }

        function logout() { localStorage.removeItem('adminToken'); window.location.href = '/api/admin-panel/login'; }

        function openModal(item = null) {
            document.getElementById('modalOverlay').classList.add('active');
            document.getElementById('modalTitle').textContent = item ? 'Modifier la thématique' : 'Nouvelle thématique';
            if (item) {
                document.getElementById('itemId').value = item.id;
                document.getElementById('name').value = item.name || '';
                document.getElementById('description').value = item.description || '';
                document.getElementById('order').value = item.order || 1;
                document.getElementById('icon').value = item.icon || 'book';
            } else {
                document.getElementById('dataForm').reset();
                document.getElementById('itemId').value = '';
                document.getElementById('order').value = items.length + 1;
            }
        }

        function closeModal(event) {
            if (event && event.target !== event.currentTarget) return;
            document.getElementById('modalOverlay').classList.remove('active');
        }

        async function saveData(event) {
            event.preventDefault();
            const id = document.getElementById('itemId').value;
            const data = {
                name: document.getElementById('name').value,
                description: document.getElementById('description').value,
                order: parseInt(document.getElementById('order').value) || 1,
                icon: document.getElementById('icon').value || 'book'
            };
            try {
                if (id) {
                    await apiRequest(`/admin/thematiques/${id}`, 'PUT', data);
                    showToast('Thématique modifiée');
                } else {
                    await apiRequest('/admin/thematiques', 'POST', data);
                    showToast('Thématique créée');
                }
                closeModal();
                loadData();
            } catch (error) { showToast(error.message, 'error'); }
        }

        async function deleteItem(id, name) {
            if (!confirm(`Supprimer "${name}" ?`)) return;
            try {
                await apiRequest(`/admin/thematiques/${id}`, 'DELETE');
                showToast('Thématique supprimée');
                loadData();
            } catch (error) { showToast(error.message, 'error'); }
        }

        async function toggleItem(id) {
            try {
                await apiRequest(`/admin/thematiques/${id}/toggle`, 'PATCH');
                loadData();
            } catch (error) { showToast(error.message, 'error'); }
        }

        function renderData(data) {
            if (data.length === 0) {
                document.getElementById('dataTable').innerHTML = `<p style="color: var(--text-secondary); text-align: center; padding: 40px;">Aucune thématique. Cliquez sur "Nouvelle thématique" pour commencer.</p>`;
                return;
            }
            document.getElementById('dataTable').innerHTML = `
                <table>
                    <thead><tr><th>#</th><th>Thématique</th><th>Description</th><th>Statut</th><th>Actions</th></tr></thead>
                    <tbody>
                        ${data.map(item => `
                            <tr>
                                <td><span class="order-badge">${item.order || '-'}</span></td>
                                <td>
                                    <div class="table-cell-text"><i class="fas fa-${item.icon || 'book'}" style="margin-right:8px;color:var(--brand-primary)"></i>${item.name}</div>
                                </td>
                                <td><div class="table-cell-subtext">${(item.description || '-').substring(0, 60)}${item.description && item.description.length > 60 ? '...' : ''}</div></td>
                                <td><span class="status ${item.is_active !== false ? 'status-active' : 'status-inactive'}">${item.is_active !== false ? 'Actif' : 'Inactif'}</span></td>
                                <td>
                                    <div class="actions">
                                        <button class="btn btn-secondary btn-sm btn-icon" onclick="editItem('${item.id}')"><i class="fas fa-edit"></i></button>
                                        <button class="btn btn-secondary btn-sm btn-icon" onclick="toggleItem('${item.id}')"><i class="fas fa-toggle-${item.is_active !== false ? 'on' : 'off'}"></i></button>
                                        <button class="btn btn-danger btn-sm btn-icon" onclick="deleteItem('${item.id}')"><i class="fas fa-trash"></i></button>
                                    </div>
                                </td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
        }

        function editItem(id) {
            const item = items.find(i => i.id === id);
            if (item) openModal(item);
        }

        async function deleteItem(id) {
            const item = items.find(i => i.id === id);
            if (!confirm(`Supprimer "${item?.name || id}" ?`)) return;
            try {
                await apiRequest(`/admin/thematiques/${id}`, 'DELETE');
                showToast('Supprime');
                loadData();
            } catch (error) { showToast(error.message, 'error'); }
        }

        async function loadData() {
            try {
                const user = await apiRequest('/auth/me');
                if (!user || user.role !== 'admin') { localStorage.removeItem('adminToken'); window.location.href = '/api/admin-panel/login'; return; }
                document.getElementById('userName').textContent = user.name || user.email;
                if (user.picture) document.getElementById('userAvatar').src = user.picture;
                items = await apiRequest('/admin/thematiques') || [];
                renderData(items);
            } catch (error) { showToast('Erreur de chargement', 'error'); }
        }

        if (!authToken) { window.location.href = '/api/admin-panel/login'; } else { loadData(); }
    </script>
</body>
</html>
