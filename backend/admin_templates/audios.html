<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audios - HikmabyLM Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --bg-primary: #0a0a0a; --bg-secondary: #141414; --bg-tertiary: #1a1a1a; --bg-card: #1e1e1e; --text-primary: #ffffff; --text-secondary: #a0a0a0; --text-muted: #666666; --brand-primary: #04D182; --brand-secondary: #02b36e; --border-subtle: #2a2a2a; --border-hover: #3a3a3a; --danger: #ef4444; --warning: #f59e0b; --success: #10b981; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg-primary); color: var(--text-primary); min-height: 100vh; }
        .admin-layout { display: flex; min-height: 100vh; }
        .sidebar { width: 260px; background: var(--bg-secondary); border-right: 1px solid var(--border-subtle); padding: 24px 0; position: fixed; height: 100vh; overflow-y: auto; display: flex; flex-direction: column; }
        .sidebar-header { padding: 0 20px 24px; border-bottom: 1px solid var(--border-subtle); margin-bottom: 16px; }
        .sidebar-logo { display: flex; align-items: center; gap: 12px; }
        .sidebar-logo-icon { width: 40px; height: 40px; background: linear-gradient(135deg, var(--brand-primary), var(--brand-secondary)); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: 700; }
        .sidebar-logo-text { font-size: 18px; font-weight: 700; }
        .sidebar-logo-text span { color: var(--brand-primary); }
        .sidebar-badge { font-size: 10px; color: var(--text-secondary); background: var(--bg-tertiary); padding: 2px 8px; border-radius: 4px; margin-top: 4px; display: inline-block; }
        .sidebar-nav { padding: 0 12px; flex: 1; }
        .nav-section { margin-bottom: 24px; }
        .nav-section-title { font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted); padding: 0 12px; margin-bottom: 8px; }
        .nav-item { display: flex; align-items: center; gap: 12px; padding: 12px; border-radius: 8px; color: var(--text-secondary); text-decoration: none; transition: all 0.2s; margin-bottom: 4px; }
        .nav-item:hover { background: var(--bg-tertiary); color: var(--text-primary); }
        .nav-item.active { background: rgba(4, 209, 130, 0.1); color: var(--brand-primary); }
        .nav-item i { width: 20px; text-align: center; font-size: 16px; }
        .user-header { display: flex; align-items: center; gap: 12px; padding: 20px; border-top: 1px solid var(--border-subtle); margin-top: auto; }
        .user-avatar { width: 36px; height: 36px; border-radius: 8px; object-fit: cover; }
        .user-info { flex: 1; min-width: 0; }
        .user-name { font-size: 14px; font-weight: 500; }
        .user-role { font-size: 12px; color: var(--brand-primary); }
        .logout-btn { background: none; border: none; color: var(--text-secondary); cursor: pointer; padding: 8px; border-radius: 6px; }
        .logout-btn:hover { background: var(--bg-tertiary); color: var(--danger); }
        .main-content { flex: 1; margin-left: 260px; padding: 32px; }
        .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px; }
        .page-title { font-size: 28px; font-weight: 700; }
        .page-description { color: var(--text-secondary); margin-top: 4px; font-size: 14px; }
        .btn { display: inline-flex; align-items: center; gap: 8px; padding: 10px 20px; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; border: none; transition: all 0.2s; text-decoration: none; }
        .btn-primary { background: var(--brand-primary); color: var(--bg-primary); }
        .btn-primary:hover { background: var(--brand-secondary); }
        .btn-secondary { background: var(--bg-tertiary); color: var(--text-primary); border: 1px solid var(--border-subtle); }
        .btn-danger { background: var(--danger); color: white; }
        .btn-sm { padding: 6px 12px; font-size: 13px; }
        .btn-icon { padding: 8px; width: 36px; height: 36px; justify-content: center; }
        .card { background: var(--bg-card); border: 1px solid var(--border-subtle); border-radius: 12px; padding: 24px; margin-bottom: 24px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 14px 16px; text-align: left; border-bottom: 1px solid var(--border-subtle); }
        th { font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-secondary); font-weight: 600; }
        tr:hover { background: var(--bg-tertiary); }
        .table-avatar { width: 48px; height: 48px; border-radius: 8px; object-fit: cover; }
        .table-cell-flex { display: flex; align-items: center; gap: 12px; }
        .table-cell-text { font-weight: 500; max-width: 280px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .table-cell-subtext { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
        .status { display: inline-flex; align-items: center; gap: 6px; padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 500; }
        .status-active { background: rgba(16, 185, 129, 0.15); color: var(--success); }
        .status-inactive { background: rgba(239, 68, 68, 0.15); color: var(--danger); }
        .actions { display: flex; gap: 8px; }
        .loading { display: flex; align-items: center; justify-content: center; padding: 40px; color: var(--text-secondary); }
        .spinner { width: 24px; height: 24px; border: 2px solid var(--border-subtle); border-top-color: var(--brand-primary); border-radius: 50%; animation: spin 0.8s linear infinite; margin-right: 12px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .empty-state { text-align: center; padding: 60px 20px; color: var(--text-secondary); }
        .empty-state i { font-size: 48px; margin-bottom: 16px; opacity: 0.5; }
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0, 0, 0, 0.8); display: flex; align-items: center; justify-content: center; z-index: 1000; opacity: 0; visibility: hidden; transition: all 0.3s; }
        .modal-overlay.active { opacity: 1; visibility: visible; }
        .modal { background: var(--bg-card); border-radius: 16px; max-width: 700px; width: 90%; max-height: 90vh; overflow-y: auto; transform: translateY(20px); transition: transform 0.3s; }
        .modal-overlay.active .modal { transform: translateY(0); }
        .modal-header { padding: 20px 24px; border-bottom: 1px solid var(--border-subtle); display: flex; justify-content: space-between; align-items: center; }
        .modal-title { font-size: 18px; font-weight: 600; }
        .modal-close { background: none; border: none; color: var(--text-secondary); font-size: 20px; cursor: pointer; }
        .modal-body { padding: 24px; }
        .modal-footer { padding: 16px 24px; border-top: 1px solid var(--border-subtle); display: flex; justify-content: flex-end; gap: 12px; }
        .form-group { margin-bottom: 20px; }
        .form-label { display: block; font-size: 14px; font-weight: 500; margin-bottom: 8px; }
        .form-input, .form-textarea, .form-select { width: 100%; padding: 12px 16px; background: var(--bg-tertiary); border: 1px solid var(--border-subtle); border-radius: 8px; color: var(--text-primary); font-size: 14px; font-family: inherit; }
        .form-input:focus, .form-textarea:focus, .form-select:focus { outline: none; border-color: var(--brand-primary); }
        .form-textarea { min-height: 100px; resize: vertical; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .toast-container { position: fixed; top: 24px; right: 24px; z-index: 1100; }
        .toast { background: var(--bg-card); border: 1px solid var(--border-subtle); border-radius: 10px; padding: 16px 20px; display: flex; align-items: center; gap: 12px; margin-bottom: 12px; animation: slideIn 0.3s ease; min-width: 300px; }
        .toast.success { border-left: 4px solid var(--success); }
        .toast.error { border-left: 4px solid var(--danger); }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .search-box { position: relative; max-width: 300px; }
        .search-box i { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--text-muted); }
        .search-input { width: 100%; padding: 10px 14px 10px 40px; background: var(--bg-tertiary); border: 1px solid var(--border-subtle); border-radius: 8px; color: var(--text-primary); font-size: 14px; }
        .toolbar { display: flex; gap: 16px; align-items: center; margin-bottom: 24px; flex-wrap: wrap; }
        .tag { display: inline-block; padding: 2px 8px; background: var(--bg-tertiary); border-radius: 4px; font-size: 11px; color: var(--text-secondary); margin-right: 4px; }
        .play-btn { background: var(--brand-primary); color: var(--bg-primary); border: none; width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .play-btn:hover { background: var(--brand-secondary); }
        @media (max-width: 768px) { .sidebar { width: 70px; } .sidebar-header, .nav-section-title, .user-info, .nav-item span, .sidebar-badge { display: none; } .main-content { margin-left: 70px; padding: 20px; } .form-row { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="admin-layout">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo">
                    <div class="sidebar-logo-icon">H</div>
                    <div>
                        <div class="sidebar-logo-text">Hikma<span>byLM</span></div>
                        <div class="sidebar-badge">Admin Panel</div>
                    </div>
                </div>
            </div>
            <nav class="sidebar-nav">
                <div class="nav-section">
                    <div class="nav-section-title">Dashboard</div>
                    <a href="/api/admin-panel/" class="nav-item"><i class="fas fa-chart-pie"></i><span>Tableau de bord</span></a>
                </div>
                <div class="nav-section">
                    <div class="nav-section-title">Contenu</div>
                    <a href="/api/admin-panel/professors" class="nav-item"><i class="fas fa-user-graduate"></i><span>Professeurs</span></a>
                    <a href="/api/admin-panel/courses" class="nav-item"><i class="fas fa-book-open"></i><span>Cours</span></a>
                    <a href="/api/admin-panel/audios" class="nav-item active"><i class="fas fa-headphones"></i><span>Audios</span></a>
                    <a href="/api/admin-panel/thematiques" class="nav-item"><i class="fas fa-layer-group"></i><span>Cursus</span></a>
                    <a href="/api/admin-panel/bibliographies" class="nav-item"><i class="fas fa-book"></i><span>Bibliographies</span></a>
                    <a href="/api/admin-panel/masterclasses" class="nav-item"><i class="fas fa-video"></i><span>Masterclasses</span></a>
                </div>
                <div class="nav-section">
                    <div class="nav-section-title">Gestion</div>
                    <a href="/api/admin-panel/users" class="nav-item"><i class="fas fa-users"></i><span>Utilisateurs</span></a>
                    <a href="/api/admin-panel/r2" class="nav-item"><i class="fas fa-cloud"></i><span>Stockage R2</span></a>
                </div>
            </nav>
            <div class="user-header">
                <img src="https://ui-avatars.com/api/?name=Admin&background=04D182&color=000" class="user-avatar" id="userAvatar">
                <div class="user-info">
                    <div class="user-name" id="userName">Admin</div>
                    <div class="user-role">Administrateur</div>
                </div>
                <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i></button>
            </div>
        </aside>

        <main class="main-content">
            <div class="page-header">
                <div>
                    <h1 class="page-title">Audios</h1>
                    <p class="page-description">Gérez les podcasts, conférences et récitations</p>
                </div>
                <button class="btn btn-primary" onclick="openModal()"><i class="fas fa-plus"></i> Nouvel audio</button>
            </div>

            <div class="toolbar">
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" class="search-input" placeholder="Rechercher un audio..." id="searchInput" oninput="filterAudios()">
                </div>
                <select class="form-select" id="typeFilter" onchange="filterAudios()" style="width: auto; padding: 10px 16px;">
                    <option value="">Tous les types</option>
                    <option value="podcast">Podcasts</option>
                    <option value="lecture">Conférences</option>
                    <option value="quran">Coran</option>
                    <option value="documentary">Documentaires</option>
                </select>
            </div>

            <div class="card">
                <div id="audiosTable"><div class="loading"><div class="spinner"></div> Chargement...</div></div>
            </div>
        </main>
    </div>

    <div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
        <div class="modal" onclick="event.stopPropagation()">
            <div class="modal-header">
                <h3 class="modal-title" id="modalTitle">Nouvel audio</h3>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <form id="audioForm" onsubmit="saveAudio(event)">
                <div class="modal-body">
                    <input type="hidden" id="audioId">
                    <div class="form-group">
                        <label class="form-label">Titre *</label>
                        <input type="text" class="form-input" id="title" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Description</label>
                        <textarea class="form-textarea" id="description"></textarea>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">Professeur *</label>
                            <select class="form-select" id="scholar_id" required></select>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Type</label>
                            <select class="form-select" id="type">
                                <option value="podcast">Podcast</option>
                                <option value="lecture">Conférence</option>
                                <option value="quran">Coran</option>
                                <option value="documentary">Documentaire</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">Topic</label>
                            <input type="text" class="form-input" id="topic" placeholder="Ex: Philosophie islamique">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Durée (secondes)</label>
                            <input type="number" class="form-input" id="duration" value="0">
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Clé fichier R2 (file_key)</label>
                        <input type="text" class="form-input" id="file_key" placeholder="Ex: podcasts/mon-audio.mp3">
                    </div>
                    <div class="form-group">
                        <label class="form-label">URL de la miniature</label>
                        <input type="url" class="form-input" id="thumbnail">
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" onclick="closeModal()">Annuler</button>
                    <button type="submit" class="btn btn-primary">Enregistrer</button>
                </div>
            </form>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script>
        const API_BASE = '/api';
        let authToken = localStorage.getItem('adminToken');
        let audios = [];
        let scholars = [];

        function showToast(message, type = 'success') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerHTML = `<i class="fas fa-${type === 'success' ? 'check-circle' : 'exclamation-circle'}"></i><span>${message}</span>`;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 4000);
        }

        async function apiRequest(endpoint, method = 'GET', body = null) {
            const options = { method, headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${authToken}` } };
            if (body) options.body = JSON.stringify(body);
            const response = await fetch(`${API_BASE}${endpoint}`, options);
            if (response.status === 401 || response.status === 403) { localStorage.removeItem('adminToken'); window.location.href = '/api/admin-panel/login'; return null; }
            if (!response.ok) { const error = await response.json(); throw new Error(error.detail || 'Erreur serveur'); }
            return response.json();
        }

        function logout() { localStorage.removeItem('adminToken'); window.location.href = '/api/admin-panel/login'; }

        function formatDuration(seconds) {
            if (!seconds) return '-';
            const h = Math.floor(seconds / 3600);
            const m = Math.floor((seconds % 3600) / 60);
            const s = seconds % 60;
            if (h > 0) return `${h}h ${m}min`;
            return `${m}min ${s}s`;
        }

        function openModal(audio = null) {
            document.getElementById('modalOverlay').classList.add('active');
            document.getElementById('modalTitle').textContent = audio ? 'Modifier l\'audio' : 'Nouvel audio';
            populateScholarSelect();
            
            if (audio) {
                document.getElementById('audioId').value = audio.id;
                document.getElementById('title').value = audio.title || '';
                document.getElementById('description').value = audio.description || '';
                document.getElementById('scholar_id').value = audio.scholar_id || '';
                document.getElementById('type').value = audio.type || 'podcast';
                document.getElementById('topic').value = audio.topic || '';
                document.getElementById('duration').value = audio.duration || 0;
                document.getElementById('file_key').value = audio.file_key || '';
                document.getElementById('thumbnail').value = audio.thumbnail || '';
            } else {
                document.getElementById('audioForm').reset();
                document.getElementById('audioId').value = '';
            }
        }

        function closeModal(event) {
            if (event && event.target !== event.currentTarget) return;
            document.getElementById('modalOverlay').classList.remove('active');
        }

        function populateScholarSelect() {
            const select = document.getElementById('scholar_id');
            select.innerHTML = '<option value="">-- Sélectionner --</option>' + 
                scholars.map(s => `<option value="${s.id}">${s.name}</option>`).join('');
        }

        async function saveAudio(event) {
            event.preventDefault();
            const id = document.getElementById('audioId').value;
            const scholarId = document.getElementById('scholar_id').value;
            const scholar = scholars.find(s => s.id === scholarId);
            
            const data = {
                title: document.getElementById('title').value,
                description: document.getElementById('description').value,
                scholar_id: scholarId,
                scholar_name: scholar ? scholar.name : '',
                type: document.getElementById('type').value,
                topic: document.getElementById('topic').value,
                duration: parseInt(document.getElementById('duration').value) || 0,
                file_key: document.getElementById('file_key').value,
                thumbnail: document.getElementById('thumbnail').value
            };

            try {
                if (id) {
                    await apiRequest(`/admin/audios/${id}`, 'PUT', data);
                    showToast('Audio modifié avec succès');
                } else {
                    await apiRequest('/admin/audios', 'POST', data);
                    showToast('Audio créé avec succès');
                }
                closeModal();
                loadAudios();
            } catch (error) {
                showToast(error.message, 'error');
            }
        }

        async function deleteAudio(id, title) {
            if (!confirm(`Supprimer "${title}" ?`)) return;
            try {
                await apiRequest(`/admin/audios/${id}`, 'DELETE');
                showToast('Audio supprimé');
                loadAudios();
            } catch (error) { showToast(error.message, 'error'); }
        }

        async function toggleAudio(id) {
            try {
                await apiRequest(`/admin/audios/${id}/toggle`, 'PATCH');
                loadAudios();
            } catch (error) { showToast(error.message, 'error'); }
        }

        function filterAudios() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const typeFilter = document.getElementById('typeFilter').value;
            const filtered = audios.filter(a => {
                const matchQuery = a.title.toLowerCase().includes(query) || (a.scholar_name && a.scholar_name.toLowerCase().includes(query));
                const matchType = !typeFilter || a.type === typeFilter;
                return matchQuery && matchType;
            });
            renderAudios(filtered);
        }

        function renderAudios(data) {
            if (data.length === 0) {
                document.getElementById('audiosTable').innerHTML = `<div class="empty-state"><i class="fas fa-headphones"></i><h3>Aucun audio</h3></div>`;
                return;
            }
            document.getElementById('audiosTable').innerHTML = `
                <table>
                    <thead><tr><th>Audio</th><th>Professeur</th><th>Type</th><th>Duree</th><th>Statut</th><th>Actions</th></tr></thead>
                    <tbody>
                        ${data.map(a => `
                            <tr>
                                <td>
                                    <div class="table-cell-flex">
                                        <img src="${a.thumbnail || 'https://via.placeholder.com/48'}" class="table-avatar">
                                        <div>
                                            <div class="table-cell-text">${a.title}</div>
                                            <div class="table-cell-subtext">${a.topic || '-'}</div>
                                        </div>
                                    </div>
                                </td>
                                <td>${a.scholar_name || '-'}</td>
                                <td><span class="tag">${a.type || '-'}</span></td>
                                <td>${formatDuration(a.duration)}</td>
                                <td><span class="status ${a.is_active !== false ? 'status-active' : 'status-inactive'}">${a.is_active !== false ? 'Actif' : 'Inactif'}</span></td>
                                <td>
                                    <div class="actions">
                                        <button class="btn btn-secondary btn-sm btn-icon" onclick='openModal(${JSON.stringify(a).replace(/'/g, "&apos;")})'><i class="fas fa-edit"></i></button>
                                        <button class="btn btn-secondary btn-sm btn-icon" onclick="toggleAudio('${a.id}')"><i class="fas fa-toggle-${a.is_active !== false ? 'on' : 'off'}"></i></button>
                                        <button class="btn btn-danger btn-sm btn-icon" onclick="deleteAudio('${a.id}', '${a.title.replace(/'/g, "\\'").replace(/"/g, '\\"')}')"><i class="fas fa-trash"></i></button>
                                    </div>
                                </td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
        }

        async function loadAudios() {
            try {
                const user = await apiRequest('/auth/me');
                if (!user || user.role !== 'admin') { localStorage.removeItem('adminToken'); window.location.href = '/api/admin-panel/login'; return; }
                document.getElementById('userName').textContent = user.name || user.email;
                if (user.picture) document.getElementById('userAvatar').src = user.picture;

                [scholars, audios] = await Promise.all([apiRequest('/admin/scholars'), apiRequest('/admin/audios')]);
                scholars = scholars || [];
                audios = audios || [];
                renderAudios(audios);
            } catch (error) { showToast('Erreur de chargement', 'error'); }
        }

        if (!authToken) { window.location.href = '/api/admin-panel/login'; } else { loadAudios(); }
    </script>
</body>
</html>
